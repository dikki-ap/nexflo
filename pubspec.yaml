name: nexflo
description: NexFlo - Next-level money flow
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management & Navigation ──────────────────────
  get: ^4.7.3

  # ── Local Database ──────────────────────────────────────
  drift: ^2.32.1
  drift_flutter: ^0.3.0

  # ── Auth & Google Services ─────────────────────────────
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # ── Network ────────────────────────────────────────────
  http: ^1.2.2
  connectivity_plus: ^6.1.3

  # ── Secure Storage ─────────────────────────────────────
  flutter_secure_storage: ^9.2.4

  # ── UI & Charts ────────────────────────────────────────
  fl_chart: ^1.2.0
  flutter_colorpicker: ^1.1.0
  flutter_iconpicker: ^3.8.0
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # ── Image & OCR ────────────────────────────────────────
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1

  # ── Biometric & Security ───────────────────────────────
  local_auth: ^3.0.1

  # ── Utilities ──────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^11.4.0
  table_calendar: ^3.2.0
  reorderable_grid_view: ^2.2.8

  # ── Clean Architecture ─────────────────────────────────
  dartz: ^0.10.1
  equatable: ^2.0.5

  # ── Security ───────────────────────────────────────────
  crypto: ^3.0.3

  # ── Export ─────────────────────────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0

  # ── Background Tasks ───────────────────────────────────
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
